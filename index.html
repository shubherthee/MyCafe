<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyCampus Cafe Menu</title>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    input,
    select,
    button {
      margin: 5px;
      padding: 8px;
    }

    .menu-card {
      border: 1px solid #ccc;
      padding: 15px;
      margin-top: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <div id="app">

    <h2>MyCampus Cafe Menu</h2>

    <form @submit.prevent="addMenu">

      <input
        v-model="newMenu.menu_name"
        placeholder="Menu name"
        required
      >

      <input
        v-model="newMenu.category"
        placeholder="Category"
        required
      >

      <input
        v-model="newMenu.price"
        type="number"
        step="0.01"
        placeholder="Price"
        required
      >

      <select v-model="newMenu.availability">
        <option>Available</option>
        <option>Unavailable</option>
      </select>

      <button type="submit">Add Menu</button>

    </form>

    <div
      v-for="item in menuItems"
      :key="item.menu_id"
      class="menu-card"
    >

      <div v-if="editId !== item.menu_id">

        <h3>{{ item.menu_name }}</h3>

        <p>Category: {{ item.category }}</p>

        <p>Price: RM {{ item.price }}</p>

        <p>Status: {{ item.availability }}</p>

        <button @click="startEdit(item)">
          Edit
        </button>

        <button @click="deleteMenu(item.menu_id)">
          Delete
        </button>

      </div>

      <div v-else>

        <input
          v-model="editMenu.menu_name"
          placeholder="Menu name"
        >

        <input
          v-model="editMenu.category"
          placeholder="Category"
        >

        <input
          v-model="editMenu.price"
          type="number"
          step="0.01"
          placeholder="Price"
        >

        <select v-model="editMenu.availability">
          <option>Available</option>
          <option>Unavailable</option>
        </select>

        <button @click="updateMenu(item.menu_id)">
          Update
        </button>

        <button @click="cancelEdit">
          Cancel
        </button>

      </div>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
