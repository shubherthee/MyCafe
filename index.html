<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Cafe</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg-orb bg-orb-blue"></div>
  <div class="bg-orb bg-orb-pink"></div>

  <div id="app">
    <main class="app-shell">
      <section class="hero-card glass-card title-card">
        <h1>My Cafe</h1>
      </section>

      <p v-if="message" class="status-msg glass-chip">{{ message }}</p>

      <section class="glass-card auth-box">
        <div v-if="!isLoggedIn">
          <form class="stack-form" @submit.prevent="loginStaff">
            <input v-model="login.username" placeholder="Username" required>
            <input v-model="login.password" type="password" placeholder="Password" required>
            <button type="submit" class="btn-primary">Login</button>
          </form>
        </div>
        <div v-else class="logged-in-row">
          <button @click="logoutStaff" class="btn-secondary">Logout</button>
        </div>
      </section>

      <section v-if="isLoggedIn" class="glass-card editor-box">
        <form class="stack-form compact-grid" @submit.prevent="addMenu">
          <input v-model="newMenu.menu_name" placeholder="Menu name" required>
          <input v-model="newMenu.category" placeholder="Category" required>
          <input v-model="newMenu.price" type="number" step="0.01" placeholder="Price" required>
          <select v-model="newMenu.availability">
            <option>Available</option>
            <option>Unavailable</option>
          </select>
          <button type="submit" class="btn-primary btn-wide">Add Menu</button>
        </form>
      </section>

      <section class="menu-section">
        <div class="menu-grid">
          <article v-for="item in menuItems" :key="item.menu_id" class="glass-card menu-card">
            <div v-if="editId !== item.menu_id" class="menu-view">
              <div class="menu-topline">
                <h3>{{ item.menu_name }}</h3>
                <span class="badge" :class="item.availability === 'Available' ? 'badge-available' : 'badge-unavailable'">{{ item.availability }}</span>
              </div>
              <p class="category">{{ item.category }}</p>
              <p class="price">RM {{ item.price }}</p>
              <div v-if="isLoggedIn" class="card-actions">
                <button @click="startEdit(item)" class="btn-secondary">Edit</button>
                <button @click="deleteMenu(item.menu_id)" class="btn-danger">Delete</button>
              </div>
            </div>
            <div v-else class="menu-edit stack-form">
              <input v-model="editMenu.menu_name" placeholder="Menu name">
              <input v-model="editMenu.category" placeholder="Category">
              <input v-model="editMenu.price" type="number" step="0.01" placeholder="Price">
              <select v-model="editMenu.availability">
                <option>Available</option>
                <option>Unavailable</option>
              </select>
              <div class="card-actions">
                <button @click="updateMenu(item)" class="btn-primary">Update</button>
                <button @click="cancelEdit" class="btn-secondary">Cancel</button>
              </div>
            </div>
          </article>
        </div>
      </section>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="app.js"></script>
</body>
</html>
